<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1320" role="img" aria-labelledby="title desc">
  <title id="title">Project JOSH humanoid robot concept mockup</title>
  <desc id="desc">An original draft concept illustration of a compact humanoid robot with matte black body panels, rounded modular joints, and green and purple WE Bots accent lighting.</desc>
  <defs>
    <linearGradient id="body" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#34373a"/>
      <stop offset="0.44" stop-color="#17191b"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#4b4f52"/>
      <stop offset="0.55" stop-color="#1d2023"/>
      <stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <linearGradient id="accentPurple" x1="0" x2="1">
      <stop offset="0" stop-color="#6d3ead"/>
      <stop offset="1" stop-color="#4F2683"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0" x2="1">
      <stop offset="0" stop-color="#55a642"/>
      <stop offset="1" stop-color="#2F7A1B"/>
    </linearGradient>
    <linearGradient id="warmMetal" x1="0" x2="1">
      <stop offset="0" stop-color="#d6a45a"/>
      <stop offset="0.48" stop-color="#9f6c2d"/>
      <stop offset="1" stop-color="#f0c47b"/>
    </linearGradient>
    <radialGradient id="visor" cx="50%" cy="45%" r="62%">
      <stop offset="0" stop-color="#202326"/>
      <stop offset="0.72" stop-color="#0a0b0c"/>
      <stop offset="1" stop-color="#000"/>
    </radialGradient>
    <filter id="softShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="greenGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#2F7A1B" flood-opacity="0.72"/>
    </filter>
  </defs>

  <rect width="720" height="1320" fill="none"/>
  <g filter="url(#softShadow)">
    <!-- head and neck -->
    <path d="M302 75c0-27 22-49 49-49h18c27 0 49 22 49 49v117c0 34-27 61-61 61h-6c-27 0-49-22-49-49z" fill="url(#panel)" stroke="#5a5f65" stroke-width="3"/>
    <path d="M318 86c0-21 17-38 38-38h9c21 0 38 17 38 38v83c0 28-23 51-51 51h-3c-17 0-31-14-31-31z" fill="url(#visor)" opacity="0.96"/>
    <path d="M327 81c14-12 51-15 72-4" fill="none" stroke="#7d858b" stroke-width="5" stroke-linecap="round" opacity="0.28"/>
    <path d="M331 218h58l-7 62h-44z" fill="url(#body)" stroke="#41474c" stroke-width="3"/>
    <path d="M343 247h34l8 38h-50z" fill="url(#warmMetal)" opacity="0.78"/>

    <!-- shoulders and torso -->
    <path d="M216 307c28-41 83-62 144-62s116 21 144 62c19 28 33 95 31 171-1 70-24 125-63 160-28 25-70 37-112 37s-84-12-112-37c-39-35-62-90-63-160-2-76 12-143 31-171z" fill="url(#body)" stroke="#525960" stroke-width="4"/>
    <path d="M244 342c28-35 68-53 116-53s88 18 116 53c-5 88-31 179-116 274-85-95-111-186-116-274z" fill="url(#panel)" opacity="0.88"/>
    <path d="M289 374c0-16 13-29 29-29h84c16 0 29 13 29 29v42c0 16-13 29-29 29h-84c-16 0-29-13-29-29z" fill="#0a0b0d" stroke="#71777d" stroke-width="4"/>
    <circle cx="360" cy="395" r="25" fill="#101214" stroke="#aab3ba" stroke-width="5"/>
    <circle cx="360" cy="395" r="9" fill="#111" stroke="url(#accentGreen)" stroke-width="4" filter="url(#greenGlow)"/>
    <path d="M255 300h-86c-26 0-47 21-47 47v42c0 26 21 47 47 47h58z" fill="url(#body)" stroke="#4d5358" stroke-width="4"/>
    <path d="M465 300h86c26 0 47 21 47 47v42c0 26-21 47-47 47h-58z" fill="url(#body)" stroke="#4d5358" stroke-width="4"/>
    <path d="M144 337h83v64h-83z" rx="18" fill="url(#accentPurple)" opacity="0.9"/>
    <path d="M493 337h83v64h-83z" rx="18" fill="url(#accentGreen)" opacity="0.9"/>
    <path d="M241 637c35 31 78 47 119 47s84-16 119-47l-20 92H261z" fill="#111315" stroke="#444a50" stroke-width="4"/>
    <path d="M262 704h196v74H262z" rx="22" fill="url(#body)" stroke="#50565d" stroke-width="4"/>
    <path d="M280 723h160" stroke="url(#accentGreen)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>

    <!-- arms -->
    <g id="left-arm">
      <path d="M146 431c-29 6-50 33-47 63l14 142c3 32 31 55 62 52l45-4-19-228z" fill="url(#body)" stroke="#4b5157" stroke-width="4"/>
      <circle cx="158" cy="689" r="45" fill="url(#warmMetal)" stroke="#35200e" stroke-width="3"/>
      <path d="M123 719c-20 16-29 43-22 68l30 108c8 30 38 48 68 40l27-7-46-222z" fill="url(#body)" stroke="#4b5157" stroke-width="4"/>
      <path d="M145 934c-10 13-12 30-6 45l12 27c7 16 24 25 42 21l28-7c23-5 38-28 33-52l-10-43z" fill="#101214" stroke="#565d64" stroke-width="4"/>
      <path d="M125 523h85" stroke="url(#accentPurple)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
      <path d="M142 771h58" stroke="url(#warmMetal)" stroke-width="6" stroke-linecap="round"/>
    </g>
    <g id="right-arm">
      <path d="M574 431c29 6 50 33 47 63l-14 142c-3 32-31 55-62 52l-45-4 19-228z" fill="url(#body)" stroke="#4b5157" stroke-width="4"/>
      <circle cx="562" cy="689" r="45" fill="url(#warmMetal)" stroke="#35200e" stroke-width="3"/>
      <path d="M597 719c20 16 29 43 22 68l-30 108c-8 30-38 48-68 40l-27-7 46-222z" fill="url(#body)" stroke="#4b5157" stroke-width="4"/>
      <path d="M575 934c10 13 12 30 6 45l-12 27c-7 16-24 25-42 21l-28-7c-23-5-38-28-33-52l10-43z" fill="#101214" stroke="#565d64" stroke-width="4"/>
      <path d="M510 523h85" stroke="url(#accentGreen)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
      <path d="M520 771h58" stroke="url(#warmMetal)" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- hips and legs -->
    <path d="M236 775h248c22 0 41 18 41 41v34c0 23-19 41-41 41H236c-22 0-41-18-41-41v-34c0-23 19-41 41-41z" fill="#111315" stroke="#494f55" stroke-width="4"/>
    <circle cx="270" cy="864" r="54" fill="url(#body)" stroke="#4f565d" stroke-width="4"/>
    <circle cx="450" cy="864" r="54" fill="url(#body)" stroke="#4f565d" stroke-width="4"/>
    <path d="M224 905c2-25 23-44 48-44h22c27 0 49 22 49 49v176c0 26-21 47-47 47h-44c-27 0-49-22-49-49z" fill="url(#body)" stroke="#4b5157" stroke-width="4"/>
    <path d="M377 910c0-27 22-49 49-49h22c25 0 46 19 48 44l21 179c0 27-22 49-49 49h-44c-26 0-47-21-47-47z" fill="url(#body)" stroke="#4b5157" stroke-width="4"/>
    <circle cx="273" cy="1139" r="43" fill="url(#warmMetal)" stroke="#35200e" stroke-width="3"/>
    <circle cx="447" cy="1139" r="43" fill="url(#warmMetal)" stroke="#35200e" stroke-width="3"/>
    <path d="M230 1165h90c23 0 42 19 42 42v15c0 25-20 45-45 45H211c-23 0-42-19-42-42v-8c0-29 23-52 52-52z" fill="#111315" stroke="#555c64" stroke-width="4"/>
    <path d="M400 1165h90c29 0 52 23 52 52v8c0 23-19 42-42 42H394c-25 0-45-20-45-45v-15c0-23 19-42 42-42z" fill="#111315" stroke="#555c64" stroke-width="4"/>
    <path d="M238 994h74" stroke="url(#accentPurple)" stroke-width="5" stroke-linecap="round" opacity="0.72"/>
    <path d="M408 994h74" stroke="url(#accentGreen)" stroke-width="5" stroke-linecap="round" opacity="0.72"/>
    <path d="M203 1220h131" stroke="#cfd5d9" stroke-width="7" stroke-linecap="round" opacity="0.74"/>
    <path d="M386 1220h131" stroke="#cfd5d9" stroke-width="7" stroke-linecap="round" opacity="0.74"/>
  </g>

  <g opacity="0.7">
    <path d="M88 1284h544" stroke="url(#accentGreen)" stroke-width="4" stroke-linecap="round"/>
    <path d="M145 1302h430" stroke="url(#accentPurple)" stroke-width="2" stroke-linecap="round" opacity="0.58"/>
  </g>
</svg>
